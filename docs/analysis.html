<title>Flux Studio has moved</title>

<!--
  Flux Studio used to live here, inside EcopanGEM. It is now its own project, because it
  is an application rather than a dataset, and because it long ago stopped being about
  E. coli: it runs over all 4,659 strain models in the combined panGEMs collection.

      https://github.com/omidard/FluxStudio
      https://omidard.github.io/FluxStudio/

  This page stays for good. The address is printed in a CV and sits in places that cannot
  be edited, so it must keep working. The query string is carried across, so the deep
  links older pages built (?tab=, ?model=, ?models=) still land where they meant to.
-->

<link rel="canonical" href="https://omidard.github.io/FluxStudio/">
<script>
  location.replace('https://omidard.github.io/FluxStudio/' + (location.search || '') + (location.hash || ''));
</script>
<noscript><meta http-equiv="refresh" content="0; url=https://omidard.github.io/FluxStudio/"></noscript>
